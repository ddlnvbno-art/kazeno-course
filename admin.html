<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazeno Admin</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-main{background:#ffb300;color:black;}
.btn-del{background:#ff4d4d;color:white;}

.video{
background:#334155;
padding:10px;
border-radius:6px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}
</style>

</head>
<body>

<div id="loginBox" class="panel">
<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button class="btn-main" onclick="login()">Login</button>

<p id="loginError" style="color:red;display:none;">Login Failed</p>
</div>

<div id="adminPanel" style="display:none">

<div class="panel">
<h2>Upload Lesson</h2>

<input id="category" placeholder="Category">
<input id="title" placeholder="Title">

<input id="link" placeholder="Video Embed Link">

<textarea id="notes" placeholder="Notes"></textarea>

<select id="isFree">
<option value="true">FREE Lesson</option>
<option value="false">PREMIUM Lesson</option>
</select>

<button class="btn-main" onclick="addVideo()">Upload Video</button>
</div>

<div class="panel">
<h2>All Lessons</h2>
<div id="videoList">Loading...</div>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { 
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyDV8UNUW7CVvJy2k5_6OMrRz197c1A7uKU",
authDomain: "kazeno-course.firebaseapp.com",
projectId: "kazeno-course",
storageBucket: "kazeno-course.firebasestorage.app",
messagingSenderId: "356111425732",
appId: "1:356111425732:web:fd5b3a7429372ec41da991"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


/* ADMIN UID */

const ADMIN_UID="4ZPJde1L9uUd6LbRLpQJvw5lYda2";


/* LOGIN */

window.login=async()=>{

try{

await signInWithEmailAndPassword(
auth,
document.getElementById("email").value,
document.getElementById("pass").value
)

}catch{

document.getElementById("loginError").style.display="block"

}

}


/* CHECK ADMIN */

onAuthStateChanged(auth,(user)=>{

if(!user)return

if(user.uid!==ADMIN_UID){

alert("Not Admin")
return

}

document.getElementById("loginBox").style.display="none"
document.getElementById("adminPanel").style.display="block"

loadVideos()

})


/* ADD VIDEO */

window.addVideo=async()=>{

const data={
category:document.getElementById("category").value,
title:document.getElementById("title").value,
link:document.getElementById("link").value,
notes:document.getElementById("notes").value,
isFree:document.getElementById("isFree").value==="true",
timestamp:Date.now()
}

await addDoc(collection(db,"videos"),data)

alert("Uploaded")

location.reload()

}


/* LOAD VIDEOS */

async function loadVideos(){

const q=query(collection(db,"videos"),orderBy("timestamp","desc"))

const snap=await getDocs(q)

let html=""

snap.forEach(docu=>{

const d=docu.data()

html+=`
<div class="video">

<div>
<b>${d.title}</b><br>
<small>${d.category}</small>
</div>

<button class="btn-del" onclick="deleteVideo('${docu.id}')">Delete</button>

</div>
`

})

document.getElementById("videoList").innerHTML=html

}


/* DELETE */

window.deleteVideo=async(id)=>{

if(!confirm("Delete lesson?"))return

await deleteDoc(doc(db,"videos",id))

location.reload()

}

</script>

</body>
</html>
