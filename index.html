<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazeno+</title>

<style>
body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
padding:12px;
margin-top:12px;
width:100%;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.login{background:#ffb300;color:black;}
.signup{background:#334155;color:white;}
.preview{background:#1e293b;color:white;border:1px solid #334155}

.video{
margin-top:20px;
background:#1e293b;
padding:10px;
border-radius:10px;
}

iframe{
width:100%;
height:200px;
border:none;
border-radius:8px;
}

.error{
color:#ff4d4d;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Kazeno Workspace</h1>

<div id="authBox" class="card">

<h3>Login / Sign Up</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="login" onclick="login()">Login</button>
<button class="signup" onclick="signup()">Sign Up</button>

<button class="preview" onclick="loadVideos()">👀 View Free Preview</button>

<div id="error" class="error"></div>

</div>

<div id="videos"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDV8UNUW7CVvJy2k5_6OMrRz197c1A7uKU",
authDomain: "kazeno-course.firebaseapp.com",
projectId: "kazeno-course",
storageBucket: "kazeno-course.firebasestorage.app",
messagingSenderId: "356111425732",
appId: "1:356111425732:web:fd5b3a7429372ec41da991"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const errorBox = document.getElementById("error");

function showError(msg){
errorBox.innerText = msg;
}

window.signup = async ()=>{

const email=document.getElementById("email").value.trim();
const pass=document.getElementById("password").value;

if(!email.includes("@") || !email.includes(".")){
showError("Email format မမှန်ပါ");
return;
}

if(pass.length < 6){
showError("Password အနည်းဆုံး 6 လုံးလိုပါတယ်");
return;
}

try{

await createUserWithEmailAndPassword(auth,email,pass);

showError("Account Created ✅ Login ဝင်နိုင်ပါပြီ");

}catch(e){

console.log(e);

if(e.code=="auth/email-already-in-use"){
showError("ဒီ email နဲ့ account ရှိပြီးသားပါ");
}

else if(e.code=="auth/weak-password"){
showError("Password အားနည်းပါတယ်");
}

else if(e.code=="auth/operation-not-allowed"){
showError("Firebase Email/Password Enable မလုပ်ရသေးပါ");
}

else{
showError(e.message);
}

}

}

window.login = async ()=>{

const email=document.getElementById("email").value.trim();
const pass=document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,pass);

showError("Login Success ✅");

loadVideos();

}catch(e){

showError("Login Failed : "+e.code);

}

}

async function loadVideos(){

const container=document.getElementById("videos");

container.innerHTML="Loading...";

try{

const q=query(collection(db,"videos"),where("isFree","==",true));

const snap=await getDocs(q);

container.innerHTML="";

snap.forEach(doc=>{

const v=doc.data();

container.innerHTML+=`
<div class="video">
<h4>${v.title}</h4>
<iframe src="${v.link}" allowfullscreen></iframe>
</div>
`;

});

if(container.innerHTML==""){
container.innerHTML="No free videos.";
}

}catch(e){

container.innerHTML="Load failed.";

}

}

</script>

</body>
</html>
