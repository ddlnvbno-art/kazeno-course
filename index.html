<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kazeno Admin Console</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#090e17; --card:#111b33; --border:rgba(255,255,255,.1);
    --text:#fff; --muted:#8b9bb4;
    --primary:#ffb300; --danger:#ff4d4d; --ok:#00e676;
    --r:16px;
  }
  body{margin:0; font-family:'Poppins', Arial; background:var(--bg); color:var(--text); padding:20px;}
  .wrap{max-width:900px; margin:0 auto;}
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .card{background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:24px; margin-bottom:20px;}
  .title{margin:0 0 16px; font-weight:800; font-size: 18px; color: var(--primary);}
  .muted{color:var(--muted); font-size:13px; line-height:1.6;}
  
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
  
  input,textarea,select{
    width:100%; padding:14px; border-radius:12px; border:1px solid var(--border);
    background:rgba(0,0,0,.2); color:var(--text); outline:none; font-family:'Poppins'; box-sizing:border-box; margin-bottom: 12px;
  }
  input:focus, textarea:focus { border-color: var(--primary); }
  textarea{min-height:100px; resize: vertical;}
  
  .btn{padding:12px 20px; border-radius:12px; border:none; cursor:pointer; font-weight:800; font-family:'Poppins'; transition:0.2s;}
  .btn:active {transform:scale(0.95);}
  .btnP{background:var(--primary); color:#000;}
  .btnS{background:rgba(255,255,255,.1); color:var(--text); border:1px solid var(--border);}
  .btnD{background:rgba(255,77,77,0.2); color:var(--danger); border:1px solid var(--danger);}
  .btnOK{background:rgba(0,230,118,0.2); color:var(--ok); border:1px solid var(--ok);}
  
  .row{display:flex; gap:10px;}
  .item{padding:16px; border-radius:14px; border:1px solid var(--border); background:rgba(0,0,0,.3); margin-top:12px;}
  .item-header { display: flex; justify-content: space-between; margin-bottom: 8px;}
  .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div class="wrap">

  <div class="card" id="loginBox" style="max-width: 400px; margin: 100px auto;">
    <h2 class="title" style="text-align:center;">Kazeno Admin</h2>
    <input id="email" placeholder="Admin Email" type="email">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn btnP" style="width:100%;" onclick="login()">Enter Console</button>
    <div id="err" style="color:var(--danger); margin-top:10px; font-size:13px; text-align:center;"></div>
  </div>

  <div id="panel" style="display:none;">
    
    <div class="header">
        <h2>Dashboard</h2>
        <button class="btn btnS" onclick="logout()">Log Out</button>
    </div>

    <div class="card" style="border-color: var(--primary);">
      <h2 class="title">💳 Pending Purchase Requests</h2>
      <div class="muted" style="margin-bottom: 15px;">Approve users here to unlock PRO access.</div>
      <div id="reqList">Loading...</div>
    </div>

    <div class="grid-2">
        <div class="card">
          <h2 class="title">🎬 Upload Premium Video</h2>
          <input id="vCategory" placeholder="Category (e.g. Module 1)">
          <input id="vTitle" placeholder="Video Title">
          <input id="vThumbnail" placeholder="Thumbnail Image URL (Optional)">
          <input id="vLink" placeholder="Cloudinary Embed URL">
          <textarea id="vNotes" placeholder="Additional Notes or Download Links"></textarea>
          <button class="btn btnP" onclick="addVideo()">Publish Video</button>
          
          <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 15px;">
              <h3 style="font-size: 15px; margin-bottom: 10px;">Manage Videos</h3>
              <div id="videoList" class="muted">Loading...</div>
          </div>
        </div>

        <div class="card">
          <h2 class="title">📝 Publish Public Post</h2>
          <input id="pTitle" placeholder="Post Title">
          <textarea id="pBody" placeholder="Post content..."></textarea>
          <input id="pImages" placeholder="Image URLs (comma separated)">
          <button class="btn btnP" onclick="addPost()">Publish Post</button>

          <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 15px;">
              <h3 style="font-size: 15px; margin-bottom: 10px;">Manage Posts</h3>
              <div id="postList" class="muted">Loading...</div>
          </div>
        </div>
    </div>

    <div class="card">
      <h2 class="title">📊 User Progress (Logs)</h2>
      <div id="progList" class="muted">Loading...</div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, setDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDV8UNUW7CVvJy2k5_6OMrRz197c1A7uKU",
    authDomain: "kazeno-course.firebaseapp.com",
    projectId: "kazeno-course",
    storageBucket: "kazeno-course.firebasestorage.app",
    messagingSenderId: "356111425732",
    appId: "1:356111425732:web:fd5b3a7429372ec41da991"
  };

  const ADMIN_UID = "4ZPJde1L9uUd6LbRLpQJvw5lYda2";
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  window.login = async ()=>{
    document.getElementById("err").textContent = "";
    try{ await signInWithEmailAndPassword(auth, document.getElementById("email").value.trim(), document.getElementById("pass").value); }
    catch(e){ document.getElementById("err").textContent = "Login Failed"; }
  };

  window.logout = async ()=>{ await signOut(auth); };

  onAuthStateChanged(auth, async (user)=>{
    if(!user) return;
    if(user.uid !== ADMIN_UID){ alert("Access Denied: Not an Admin"); await signOut(auth); return; }
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
    loadAll();
  });

  function esc(s){ return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }

  // --- Videos ---
  window.addVideo = async ()=>{
    const title = document.getElementById("vTitle").value.trim();
    const link = document.getElementById("vLink").value.trim();
    if(!title || !link) return alert("Title & Link required");

    await addDoc(collection(db,"videos"), {
      category: document.getElementById("vCategory").value.trim() || "General",
      title, link,
      thumbnail: document.getElementById("vThumbnail").value.trim(),
      notes: document.getElementById("vNotes").value.trim(),
      isFree: false, timestamp: Date.now()
    });
    alert("Video Published ✅"); location.reload();
  };

  async function loadVideos(){
    const box = document.getElementById("videoList");
    const snap = await getDocs(query(collection(db,"videos"), orderBy("timestamp","desc")));
    let html = "";
    snap.forEach(d=>{
      const v = d.data();
      html += `
        <div class="item" style="padding: 12px;">
          <div class="item-header"><b>${esc(v.title)}</b> <span class="badge">${esc(v.category)}</span></div>
          <button class="btn btnD" style="padding: 6px 12px; font-size:12px;" onclick="delDoc('videos','${d.id}')">Delete</button>
        </div>`;
    });
    box.innerHTML = html || "No videos found.";
  }

  // --- Posts ---
  window.addPost = async ()=>{
    const title = document.getElementById("pTitle").value.trim();
    if(!title) return alert("Title required");
    const imagesRaw = document.getElementById("pImages").value.trim();
    
    await addDoc(collection(db,"posts"), {
      title, body: document.getElementById("pBody").value.trim(),
      images: imagesRaw ? imagesRaw.split(",").map(x=>x.trim()).filter(Boolean) : [],
      isPublic: true, createdAt: Date.now() // Changed to Date.now() for universal sorting
    });
    alert("Post Published ✅"); location.reload();
  };

  async function loadPosts(){
    const box = document.getElementById("postList");
    const snap = await getDocs(query(collection(db,"posts"), orderBy("createdAt","desc")));
    let html = "";
    snap.forEach(d=>{
      html += `
        <div class="item" style="padding: 12px;">
          <div style="font-weight:bold; margin-bottom:8px;">${esc(d.data().title)}</div>
          <button class="btn btnD" style="padding: 6px 12px; font-size:12px;" onclick="delDoc('posts','${d.id}')">Delete</button>
        </div>`;
    });
    box.innerHTML = html || "No posts found.";
  }

  // --- Purchase Requests ---
  async function loadRequests(){
    const box = document.getElementById("reqList");
    const snap = await getDocs(query(collection(db,"purchaseRequests"), orderBy("createdAt","desc")));
    let html = "";
    snap.forEach(d=>{
      const r = d.data();
      if(r.status !== "pending") return; // Only show pending
      html += `
        <div class="item">
          <div class="item-header">
            <span>Provider: <b>${esc(r.provider)}</b></span>
            <span>Phone: <b>${esc(r.phone)}</b></span>
          </div>
          <div style="margin: 8px 0; font-family: monospace; font-size: 15px;">TX ID: <b style="color:var(--primary);">${esc(r.txRef)}</b></div>
          <div class="muted">Email: ${esc(r.email)} | UID: ${esc(r.uid)}</div>
          <div class="row" style="margin-top:12px;">
            <button class="btn btnOK" onclick="approve('${r.uid}','${d.id}')">Approve & Grant PRO</button>
            <button class="btn btnD" onclick="reject('${d.id}')">Reject</button>
          </div>
        </div>`;
    });
    box.innerHTML = html || "No pending requests.";
  }

  window.approve = async (uid, reqId)=>{
    await setDoc(doc(db,"paidUsers", uid), { active:true, plan:"lifetime", updatedAt: Date.now() }, { merge:true });
    await updateDoc(doc(db,"purchaseRequests", reqId), { status:"approved" });
    alert("Approved ✅"); loadRequests();
  };

  window.reject = async (reqId)=>{
    await updateDoc(doc(db,"purchaseRequests", reqId), { status:"rejected" });
    alert("Rejected"); loadRequests();
  };

  // --- Progress ---
  async function loadProgress(){
    const box = document.getElementById("progList");
    const snap = await getDocs(query(collection(db,"progress"), orderBy("updatedAt","desc")));
    let html = "";
    snap.forEach(d=>{
      const p = d.data();
      html += `<div class="item" style="padding:10px; font-size:12px;">UID: ${esc(p.uid)} | Video: ${esc(p.videoId)} | Done: ${p.completed?"Yes":"No"} | Saved: ${p.saved?"Yes":"No"}</div>`;
    });
    box.innerHTML = html || "No activity yet.";
  }

  window.delDoc = async (col, id)=>{ if(confirm("Delete this item?")){ await deleteDoc(doc(db,col,id)); location.reload(); } };

  function loadAll(){ loadVideos(); loadPosts(); loadRequests(); loadProgress(); }
</script>
</body>
</html>
