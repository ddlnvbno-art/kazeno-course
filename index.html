<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazeno Course App</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
        }
        .header {
            text-align: center;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h2 {
            color: #333333;
            margin: 0;
        }
        .video-card {
            background-color: #ffffff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .video-title {
            font-size: 18px;
            color: #0056b3;
            margin-bottom: 10px;
            margin-top: 0;
        }
        /* Cloudinary Player ကို ဖုန်းနှင့် အံဝင်ခွင်ကျဖြစ်စေရန် */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio ဖြင့် အချိုးကျစေရန် */
            height: 0;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .notes {
            margin-top: 10px;
            font-size: 14px;
            color: #555555;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>စိတ်မဆိုပါနဲ့တော့</h2>
        <p style="color: #666; margin-top: 5px;">ကိုကိုမှားခဲ့တာတွေအတွက်တောင်းပန်ပါတယ်</p>
    </div>

    <div class="video-card">
        <h3 class="video-title">အပိုင်း (၁) - သင်ခန်းစာ မိတ်ဆက်</h3>
        
        <div class="iframe-container">
            <iframe 
                src="https://player.cloudinary.com/embed/?cloud_name=dhcjrybpm&public_id=4_5849104708160981443_hcfnwy" 
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture" 
                allowfullscreen 
                frameborder="0">
            </iframe>
        </div>
        
        <p class="notes">📌 <b>မှတ်စု:</b> ဒီဗီဒီယိုမှာ အခြေခံအချက်တွေကို ရှင်းပြပေးထားပါတယ်။ မရှင်းလင်းတာရှိရင် ပြန်ရစ်ကြည့်နိုင်ပါတယ်။</p>
    </div>

</body>
</html>
